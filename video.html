<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video - HTML5</title>
</head>
<body>
    <h2>VIDEO DE LA CARRERA</h2>
    <video src="media/carrera.mp4" controls width="300" height="" autoplay muted></video>
    
    <hr>

    <H2>VIDEO CON POSTER</H2>
    <video src="media/carrera.mp4" controls autoplay width="300" poster="images/puente.jpg"></video>

    <hr>

    <h2>FORMATO DE VIDEO</h2>
    <video controls width="300" autoplay>
        <source src="media/carrera.mp4"type="video/mp4">
        <source src="media/audio_carrera.mp3" type="video/">
    </video>

    <hr>

    <h2>USANDO AUDIOS</h2>

    <audio src="media/audio_carrera.mp3" autoplay controls loop></audio>
